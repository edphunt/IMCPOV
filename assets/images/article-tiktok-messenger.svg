<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Editorial illustration for TikTok messenger and science engagement</title>
  <desc id="desc">A Northwestern-branded abstract composition with a phone frame, comment signals, and audience response paths.</desc>
  <defs>
    <linearGradient id="purpleField" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#4E2A84"/>
      <stop offset="1" stop-color="#2C1452"/>
    </linearGradient>
    <linearGradient id="softLavender" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E7E0F3"/>
      <stop offset="1" stop-color="#B6ACD1"/>
    </linearGradient>
    <pattern id="dotGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.1" fill="#4E2A84" opacity=".16"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111113" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF"/>
  <rect width="1600" height="900" fill="url(#dotGrid)"/>
  <path d="M0 0H462L216 900H0Z" fill="url(#purpleField)"/>
  <path d="M1340 0H1600V900H1148Z" fill="#8F7CB5" opacity=".92"/>
  <path d="M0 76L548 900H472L0 188Z" fill="#EDE8F5"/>
  <path d="M1600 88L1130 900H1054L1600 0Z" fill="#EDE8F5"/>

  <g transform="translate(520 104)" filter="url(#softShadow)">
    <rect x="0" y="0" width="508" height="690" rx="42" fill="#111113"/>
    <rect x="28" y="64" width="452" height="566" rx="24" fill="#F8F7FB"/>
    <rect x="204" y="26" width="100" height="12" rx="6" fill="#FFFFFF" opacity=".42"/>
    <circle cx="254" cy="348" r="118" fill="#4E2A84" opacity=".12"/>
    <circle cx="254" cy="316" r="70" fill="#4E2A84"/>
    <path d="M128 518c18-98 77-148 126-148s108 50 126 148" fill="#4E2A84"/>
    <path d="M156 544h196" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity=".88"/>
    <path d="M178 578h152" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity=".72"/>
  </g>

  <g fill="none" stroke="#4E2A84" stroke-width="5" opacity=".62">
    <path d="M328 242C436 148 530 144 650 226"/>
    <path d="M958 212c162-78 304-46 412 90"/>
    <path d="M384 664c118 76 250 78 392 6"/>
    <path d="M926 650c150 54 288 32 414-70"/>
  </g>

  <g>
    <circle cx="366" cy="228" r="26" fill="#B6ACD1"/>
    <circle cx="448" cy="170" r="18" fill="#4E2A84"/>
    <circle cx="1248" cy="244" r="28" fill="#D8CFE8"/>
    <circle cx="1338" cy="320" r="17" fill="#4E2A84"/>
    <circle cx="402" cy="682" r="20" fill="#4E2A84"/>
    <circle cx="1204" cy="656" r="23" fill="#B6ACD1"/>
  </g>

  <g transform="translate(108 610)">
    <rect x="0" y="0" width="304" height="186" rx="4" fill="#4E2A84"/>
    <text x="38" y="74" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Visible Identity</text>
    <text x="38" y="126" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="25" fill="#FFFFFF" opacity=".9">shapes engagement</text>
  </g>

  <g transform="translate(1120 272)">
    <text x="0" y="0" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">WHO</text>
    <text x="0" y="78" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">DELIVERS</text>
    <text x="0" y="156" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">THE MESSAGE</text>
  </g>

  <g transform="translate(108 86)">
    <rect width="72" height="72" rx="5" fill="#4E2A84"/>
    <text x="36" y="51" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#FFFFFF">N</text>
    <text x="96" y="29" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="2.5" fill="#4E2A84">IMC POV</text>
    <text x="96" y="60" font-family="Poppins, Helvetica, Arial, sans-serif" font-size="18" fill="#111113" opacity=".72">Research Insight</text>
